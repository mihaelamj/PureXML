# Mechanical enforcement of the code rules a machine can decide
# (engineering.md principle: no force-unwrap in shipping code).
#
# Inert until Swift sources exist. The CI workflow that runs swiftlint plus
# build plus test ships with the engine package.
opt_in_rules:
  - force_unwrapping
disabled_rules:
  # Suggests Foundation's String(bytes:encoding:); PureXML is Foundation-free, so
  # String(decoding:as:) from the standard library is the correct conversion.
  - optional_data_string_conversion
excluded:
  - .build
  - DerivedData
force_unwrapping: error
force_try: error
force_cast: error
line_length:
  warning: 180
  error: 180
trailing_comma:
  mandatory_comma: true
