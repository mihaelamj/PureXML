name: Style and namespacing

# One workflow per concern so each README badge tracks exactly one job and is
# truthful. This job runs the repository gates (style, commit-message
# attribution, namespacing, forbidden patterns).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  style:
    name: Style and namespacing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Repository gates
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          bash scripts/check-style.sh
          bash scripts/check-commit-attribution.sh
          bash scripts/check-namespacing.sh
          bash scripts/check-forbidden-patterns.sh
