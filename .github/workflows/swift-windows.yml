name: Swift (Windows)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  swift-windows:
    name: Swift (Windows)
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Install Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3.2-release
          swift-build: 6.3.2-RELEASE
      - name: Build and test
        shell: pwsh
        run: ./scripts/check-windows.ps1
